<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .frame {
            position: relative;
            overflow: hidden;
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            background-image: radial-gradient(49% 81% at 45% 47%, #FFE20345 0%, #073AFF00 100%),radial-gradient(113% 91% at 17% -2%, #FF5A00FF 1%, #FF000000 99%),radial-gradient(142% 91% at 83% 7%, #df5fa2 1%, #FF000000 99%),radial-gradient(142% 91% at -6% 74%, #03003BFF 1%, #FF000000 99%),radial-gradient(142% 91% at 111% 84%, #280FA0FF 0%, #010D3EFF 29%, #df5fa2 51%, #1E3098FF 100%);
            width: 1080px;
            height: 1920px;
        }
        .message {
            position: absolute;
            text-align: center;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10%;
            gap: 0.2em;
        }
        .title, .description {
            font-size: 4em;
            line-height: 1.12;
            color: #1a1a1a;
            font-family: 'Rubik', sans-serif;
            max-width: 100%;
            text-shadow:
                0 0 14px rgba(255, 255, 255, 0.95),
                0 0 28px rgba(255, 255, 255, 0.85),
                0 2px 8px rgba(0, 0, 0, 0.25);
        }
        .title { margin-bottom: 0.05em; }
        .bg {
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
            padding: 0.25em 0.55em;
            border-radius: 0.45em;
            border: 3px solid rgba(255, 255, 255, 0.9);
        }
        .title strong, .title b,
        .description strong, .description b {
            font-weight: 900;
            color: #ff0050;
        }
        .title mark, .description mark {
            background: linear-gradient(90deg, #ffe203, #ffcc00);
            color: #1a1a1a;
            padding: 0.06em 0.14em;
            border-radius: 0.1em;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
        }
        .title em, .description em {
            font-style: italic;
            color: #280fa0;
        }
        .title u, .description u {
            text-decoration: underline wavy #ff0050;
            text-underline-offset: 0.1em;
        }
        .title s, .description s {
            color: #666;
            text-decoration: line-through #ff0050;
        }
        .title span, .description span {
            display: inline;
            border-radius: 0.12em;
            padding: 0.04em 0.14em;
            box-decoration-break: clone;
            -webkit-box-decoration-break: clone;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
        }
        .overlay {
            background: rgba(0, 0, 0, 0.25);
            position: absolute;
            inset: 0;
        }
    </style>
</head>
<body>
    <div class="frame">
        <div class="overlay"></div>
        <div class="message"></div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const image = params.get('image') || '';
        if (image) {
            document.querySelector('.frame').style.backgroundImage = 'url(' + image + ')';
        }
    </script>
</body>
</html>
