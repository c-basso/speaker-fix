<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"
        integrity="sha256-2Pmvv0kuTBOenSvLm6bvfBSSHrUJ+3A7x6P5Ebd07/g=" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .frame {
            position: relative;
            overflow: hidden;
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            background-image: radial-gradient(49% 81% at 45% 47%, #FFE20345 0%, #073AFF00 100%),radial-gradient(113% 91% at 17% -2%, #FF5A00FF 1%, #FF000000 99%),radial-gradient(142% 91% at 83% 7%, #df5fa2 1%, #FF000000 99%),radial-gradient(142% 91% at -6% 74%, #03003BFF 1%, #FF000000 99%),radial-gradient(142% 91% at 111% 84%, #280FA0FF 0%, #010D3EFF 29%, #df5fa2 51%, #1E3098FF 100%);
            width: 1080px;
            height: 1920px;
        }
        .message {
            position: absolute;
            text-align: center;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10%;
        }
        .title, .description {
            font-size: 4em;
            color: #000;
            font-family: 'Rubik', sans-serif;
        }
        .title { margin-bottom: 0.1em; }
        .bg {
            background: #fff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.5);
            padding: 0.2em 0.5em;
            border-radius: 0.5em;
        }
        span { display: inline-block; }
        .logo {
            width: 300px;
            height: 300px;
            margin-bottom: 20px;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .logoCaption { width: 100%; margin-bottom: 8%; }
        .logoCaption span {
            font-size: 3em;
            color: #000;
            font-family: 'Rubik', sans-serif;
            text-align: center;
            display: inline-block;
            background: #fff;
            padding: 0.2em 0.5em;
            border-radius: 0.5em;
            font-weight: 600;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        .overlay {
            background: rgba(0, 0, 0, 0.3);
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
    </style>
</head>
<body>
    <div class="frame">
        <div class="overlay"></div>
        <div class="message"></div>
    </div>
    <script>
        $(document).ready(function () {
            const params = new URLSearchParams(window.location.search);
            const title = params.get('title') || '';
            const description = params.get('description') || '';
            const image = params.get('image') || '';
            const logo = params.get('logo') || '';
            const bg = params.get('bg') || '';
            const logoCaption = params.get('logoCaption') || '';

            if (logo) {
                $('.message').append('<div class="logo"><img src="' + logo + '" /></div>');
            }
            if (logoCaption) {
                $('.message').append('<div class="logoCaption"><span>' + logoCaption + '</span></div>');
            }
            if (title) {
                $('.message').append('<div class="title">' + title + '</div>');
                if (bg) $('.title').last().addClass('bg');
            }
            if (description) {
                $('.message').append('<div class="description">' + description + '</div>');
                if (bg) $('.description').last().addClass('bg');
            }
            if (image) {
                $('.frame').css('background-image', 'url(' + image + ')');
            }
        });
    </script>
</body>
</html>
